// ─────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────
const MODES = [
  {lvl:1,name:"BEGINNER",icon:"🌱",lives:5,pts:75, timer:0, hint:true,  hintCost:0,  col:"var(--green)", desc:"Foundational concepts"},
  {lvl:2,name:"EASY",    icon:"💡",lives:4,pts:100,timer:0, hint:true,  hintCost:50, col:"var(--cyan)",  desc:"Standard questions"},
  {lvl:3,name:"MEDIUM",  icon:"⚡",lives:3,pts:150,timer:0, hint:false, hintCost:0,  col:"var(--yellow)",desc:"Deeper understanding"},
  {lvl:4,name:"HARD",    icon:"☠️", lives:2,pts:200,timer:30,hint:false, hintCost:0,  col:"var(--red)",   desc:"Expert level + 30s timer"},
];
const SUBS = {
  linux:{name:"Linux+",icon:"🐧",color:"var(--green)",desc:"CompTIA XK0-005 prep"},
  cs:{name:"C++ / CS",icon:"💻",color:"var(--cyan)",desc:"Fundamentals & OOP"},
  cs1b:{name:"CMPR 121",icon:"📚",color:"var(--yellow)",desc:"CS1B — your actual lectures"}
};

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const S = {
  screen:"subject",
  sub:null,lvl:null,
  queue:[],idx:0,
  score:0,streak:0,best:0,lives:3,
  answered:false,hintUsed:false,
  timerSecs:0,timerInterval:null,timerPct:100,
  mode:null,
};

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
function hi(sub,lvl){return parseInt(localStorage.getItem(`tq_${sub}_${lvl}`)||"0");}
function saveHi(sub,lvl,score){if(score>hi(sub,lvl))localStorage.setItem(`tq_${sub}_${lvl}`,score);}

// ─────────────────────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────────────────────
function updateHud(){
  const m=S.mode;
  $("h-score").textContent=S.score;
  $("h-streak").textContent=(S.streak>=3?"🔥":"")+S.streak;
  $("h-lives").textContent="♥".repeat(S.lives)+"♡".repeat(m.lives-S.lives);
  $("h-qnum").textContent=`${Math.min(S.idx+1,S.queue.length)}/${S.queue.length}`;
  $("h-hi").textContent=hi(S.sub,S.lvl);
  const pct=S.queue.length?(S.idx/S.queue.length)*100:0;
  $("progbar").style.width=pct+"%";
}

// ─────────────────────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────────────────────
function startTimer(){
  const wrap=$("timer-wrap"),bar=$("timer-bar");
  wrap.style.display="block";
  S.timerSecs=S.mode.timer;
  S.timerPct=100;
  bar.style.width="100%";
  bar.className="timer-bar";
  bar.style.transition="none";
  requestAnimationFrame(()=>{
    bar.style.transition=`width ${S.mode.timer}s linear`;
    bar.style.width="0%";
  });
  S.timerInterval=setInterval(()=>{
    S.timerSecs--;
    if(S.timerSecs<=8)bar.className="timer-bar urgent";
    if(S.timerSecs<=0){
      clearInterval(S.timerInterval);
      if(!S.answered)timeUp();
    }
  },1000);
}
function stopTimer(){
  clearInterval(S.timerInterval);
  S.timerInterval=null;
}
function timeUp(){
  S.answered=true;
  S.streak=0;
  S.lives--;
  const btns=document.querySelectorAll(".answer-btn");
  btns.forEach((b,i)=>{b.disabled=true;if(i===S._correctPos)b.classList.add("correct");});
  const fb=$("fb");
  fb.className="feedback bad";
  fb.innerHTML=`⏱ <b>Time's up!</b> Correct: <b style="color:var(--green)">${S.queue[S.idx].a[S.queue[S.idx].c]}</b>\n\n<strong>Why:</strong> ${S.queue[S.idx].e}`;
  updateHud();
  showNext();
}

// ─────────────────────────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────────────────────────
function showSubjectSelect(){
  S.screen="subject";
  $("hud").style.display="none";
  $("timer-wrap").style.display="none";
  $("progbar").style.width="0%";
  $("subtitle").textContent="Linux+ · C++ Fundamentals · CMPR 121 — Select a subject";
  $("footer").textContent="Choose a subject to begin";

  const linux_q=BANK.filter(q=>q.sub==="linux").length;
  const cs_q=BANK.filter(q=>q.sub==="cs").length;
  const cs1b_q=BANK.filter(q=>q.sub==="cs1b").length;

  $("main").innerHTML=`
    <div class="subject-screen">
      <h2>&gt; SELECT SUBJECT</h2>
      <p>Pick your study focus. Each subject has 4 difficulty levels with tailored question banks.</p>
      <div class="subject-cards three">
        <div class="subject-card linux" id="btn-linux">
          <span class="icon">🐧</span>
          <div class="card-title">LINUX+</div>
          <div class="card-sub">CompTIA XK0-005</div>
          <div class="card-count">${linux_q} questions</div>
        </div>
        <div class="subject-card cs" id="btn-cs">
          <span class="icon">💻</span>
          <div class="card-title">C++ / CS</div>
          <div class="card-sub">Fundamentals &amp; OOP</div>
          <div class="card-count">${cs_q} questions</div>
        </div>
        <div class="subject-card cs1b" id="btn-cs1b">
          <span class="icon">📚</span>
          <div class="card-title" style="color:var(--yellow)">CMPR 121</div>
          <div class="card-sub">Your CS1B lectures</div>
          <div class="card-count">${cs1b_q} questions</div>
        </div>
      </div>
    </div>`;
  $("btn-linux").addEventListener("click",()=>showDifficultySelect("linux"));
  $("btn-cs").addEventListener("click",()=>showDifficultySelect("cs"));
  $("btn-cs1b").addEventListener("click",()=>showDifficultySelect("cs1b"));
}

function showDifficultySelect(sub){
  S.sub=sub;
  const info=SUBS[sub];
  $("subtitle").textContent=`${info.icon} ${info.name} — Select difficulty`;
  $("footer").textContent="Choose how tough you want it";
  $("main").innerHTML=`
    <div class="diff-screen">
      <div class="back-row"><button class="back-btn" id="back-btn">&lt; back</button></div>
      <h2>&gt; SELECT DIFFICULTY</h2>
      <div class="diff-cards" id="diff-cards"></div>
    </div>`;
  $("back-btn").addEventListener("click",showSubjectSelect);
  const wrap=$("diff-cards");
  MODES.forEach(m=>{
    const count=BANK.filter(q=>q.sub===sub&&q.lvl===m.lvl).length;
    const best=hi(sub,m.lvl);
    const el=document.createElement("div");
    el.className=`diff-card lvl${m.lvl}`;
    el.innerHTML=`
      <div class="diff-icon">${m.icon}</div>
      <div class="diff-info">
        <div class="diff-name">${m.name}</div>
        <div class="diff-desc">${m.desc}</div>
        <div class="diff-badges">
          <span class="badge life">${"♥".repeat(m.lives)} ${m.lives} lives</span>
          <span class="badge pts">+${m.pts}pts/q</span>
          ${m.timer?`<span class="badge hot">⏱ ${m.timer}s/q</span>`:""}
          ${m.hint?`<span class="badge">💡 hint</span>`:""}
          <span class="badge">${count} Qs</span>
        </div>
      </div>
      ${best?`<div class="hi-badge">🏆<br>${best}</div>`:""}`;
    el.addEventListener("click",()=>startGame(sub,m.lvl));
    wrap.appendChild(el);
  });
}

// ─────────────────────────────────────────────────────────────
// GAME
// ─────────────────────────────────────────────────────────────
function startGame(sub,lvl){
  const m=MODES.find(x=>x.lvl===lvl);
  S.sub=sub;S.lvl=lvl;S.mode=m;
  S.queue=shuffle(BANK.filter(q=>q.sub===sub&&q.lvl===lvl));
  S.idx=0;S.score=0;S.streak=0;S.best=0;S.lives=m.lives;
  S.answered=false;S.hintUsed=false;
  $("hud").style.display="grid";
  $("subtitle").textContent=`${SUBS[sub].icon} ${SUBS[sub].name} · ${m.name}`;
  updateHud();
  renderQ();
}

function renderQ(){
  if(S.lives<=0||S.idx>=S.queue.length){return gameOver();}
  S.answered=false;S.hintUsed=false;
  stopTimer();
  const q=S.queue[S.idx];
  const m=S.mode;
  const lvlNames=["","BEGINNER","EASY","MEDIUM","HARD"];
  const typeTag=q.type==="fill"?`<span class="lvl-tag l2" style="background:rgba(124,201,255,.12);color:var(--cyan);border-color:var(--cyan)">FILL</span>`:"";
  $("main").innerHTML=`
    <span class="domain-tag">${q.d}</span><span class="lvl-tag l${q.lvl}">${lvlNames[q.lvl]}</span>${typeTag}
    <div class="question">${q.q}</div>
    <div class="answers" id="ans"></div>
    <div class="feedback" id="fb"></div>
    <div class="controls" id="ctrl"></div>`;
  const wrap=$("ans");

  if(q.type==="fill"){
    // Fill-in-the-blank
    wrap.innerHTML=`
      <div class="fill-wrap">
        <input type="text" class="fill-input" id="fill-input" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Type your answer…">
        <div class="fill-tip">↵ ENTER to submit · case-insensitive</div>
        <button class="cmd fill-submit" id="fill-submit">> SUBMIT</button>
      </div>`;
    const inp=$("fill-input");
    setTimeout(()=>inp.focus(),50);
    const submit=()=>pickFill(inp.value,q);
    $("fill-submit").addEventListener("click",submit);
    inp.addEventListener("keydown",e=>{
      if(e.key==="Enter"){e.preventDefault();submit();}
    });
  } else {
    // Multiple choice (default) — shuffle answer order
    const order=shuffle(q.a.map((_,i)=>i));
    const correctPos=order.indexOf(q.c);
    S._correctPos=correctPos;
    const labels=["A","B","C","D"];
    order.forEach((origIdx,pos)=>{
      const b=document.createElement("button");
      b.className="answer-btn";
      b.dataset.pos=pos;
      b.innerHTML=`<span class="key-hint">${labels[pos]}</span>${q.a[origIdx]}`;
      b.addEventListener("click",()=>pick(pos,correctPos,q,order));
      wrap.appendChild(b);
    });
    // Hint button (MC only)
    if(m.hint){
      const ctrl=$("ctrl");
      const hb=document.createElement("button");
      hb.className="cmd yellow hint-btn";
      hb.id="hint-btn";
      hb.textContent=m.hintCost>0?`💡 50/50 (-${m.hintCost}pts)`:"💡 50/50";
      hb.addEventListener("click",()=>useHint(correctPos,q,order));
      ctrl.appendChild(hb);
    }
  }
  updateHud();
  $("footer").textContent=`${m.name} · ${m.pts}pts per correct${m.timer?` · ${m.timer}s timer`:""}`;
  if(m.timer>0)startTimer();
}

function useHint(correctPos,q,order){
  if(S.hintUsed||S.answered)return;
  S.hintUsed=true;
  const m=S.mode;
  if(m.hintCost>0)S.score=Math.max(0,S.score-m.hintCost);
  // eliminate 2 wrong answers
  const btns=document.querySelectorAll(".answer-btn");
  let eliminated=0;
  btns.forEach((b,i)=>{
    if(i!==correctPos&&eliminated<2){
      b.classList.add("eliminated");
      b.disabled=true;
      eliminated++;
    }
  });
  $("hint-btn").disabled=true;
  $("hint-btn").style.opacity=".4";
  updateHud();
}

function pick(pos,correctPos,q,order){
  if(S.answered)return;
  S.answered=true;
  stopTimer();
  const btns=document.querySelectorAll(".answer-btn");
  btns.forEach((b,i)=>{
    b.disabled=true;
    if(i===correctPos)b.classList.add("correct");
    else if(i===pos)b.classList.add("wrong");
  });
  const hb=$("hint-btn");if(hb)hb.disabled=true;
  const fb=$("fb");
  const correct=pos===correctPos;
  const m=S.mode;
  if(correct){
    S.streak++;S.best=Math.max(S.best,S.streak);
    const bonus=S.streak>=3?50:0;
    const pts=m.pts+bonus;
    S.score+=pts;
    fb.className="feedback good";
    fb.innerHTML=`✓ <b>Correct!</b> +${pts}${bonus?` <span style="color:var(--yellow)">🔥 Streak!</span>`:""}
\n<strong>Why:</strong> ${q.e}`;
  } else {
    S.streak=0;S.lives--;
    fb.className="feedback bad";
    fb.innerHTML=`✗ <b>Wrong.</b> Answer: <b style="color:var(--green)">${q.a[q.c]}</b>
\n<strong>Why:</strong> ${q.e}`;
  }
  updateHud();
  showNext();
}

function pickFill(raw,q){
  if(S.answered)return;
  S.answered=true;
  stopTimer();
  const norm=s=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
  const val=norm(raw);
  const accepted=(q.answers||[]).map(norm);
  const correct=val.length>0&&accepted.includes(val);
  const inp=$("fill-input");
  if(inp){inp.disabled=true;inp.classList.add(correct?"correct":"wrong");}
  const sb=$("fill-submit");if(sb)sb.disabled=true;
  const fb=$("fb");
  const m=S.mode;
  if(correct){
    S.streak++;S.best=Math.max(S.best,S.streak);
    const bonus=S.streak>=3?50:0;
    const pts=m.pts+bonus;
    S.score+=pts;
    fb.className="feedback good";
    fb.innerHTML=`✓ <b>Correct!</b> +${pts}${bonus?` <span style="color:var(--yellow)">🔥 Streak!</span>`:""}
\n<strong>Why:</strong> ${q.e}`;
  } else {
    S.streak=0;S.lives--;
    fb.className="feedback bad";
    fb.innerHTML=`✗ <b>Wrong.</b> Answer: <b style="color:var(--green)">${q.answers[0]}</b>
\n<strong>Why:</strong> ${q.e}`;
  }
  updateHud();
  showNext();
}

function showNext(){
  const ctrl=$("ctrl");
  // clear old hint btn if present and add next
  [...ctrl.querySelectorAll(".cmd:not(.hint-btn)")].forEach(b=>b.remove());
  const isLast=S.idx+1>=S.queue.length||S.lives<=0;
  const nb=document.createElement("button");
  nb.className="cmd";
  nb.textContent=isLast?"> FINISH":"> NEXT";
  nb.addEventListener("click",()=>{S.idx++;renderQ();});
  ctrl.appendChild(nb);
  nb.focus();
}

// ─────────────────────────────────────────────────────────────
// GAME OVER
// ─────────────────────────────────────────────────────────────
function gameOver(){
  stopTimer();
  $("timer-wrap").style.display="none";
  saveHi(S.sub,S.lvl,S.score);
  const total=S.queue.length;
  const correct=S.score/S.mode.pts|0; // rough
  const pct=S.score/(total*S.mode.pts);
  const {rank,msg}=pct>=.95?{rank:"ROOT GOD",msg:"You own this material."}
    :pct>=.80?{rank:"EXPERT",msg:"Nearly there — book the exam."}
    :pct>=.60?{rank:"PROFICIENT",msg:"Drill your weak areas and retry."}
    :pct>=.40?{rank:"LEARNING",msg:"Review the explanations and go again."}
    :{rank:"BEGINNER",msg:"Keep studying — everyone starts here."};
  const won=S.lives>0;
  const isNew=S.score>0&&S.score>=hi(S.sub,S.lvl);
  $("main").innerHTML=`
    <div class="over-screen">
      <h2>${won?"> SESSION COMPLETE":"> GAME OVER"}</h2>
      <div class="score-big">${S.score}</div>
      ${isNew?`<div class="hi-score-line">🏆 New high score!</div>`:`<div class="hi-score-line">Best: ${hi(S.sub,S.lvl)}</div>`}
      <div class="rank-label">[ ${rank} ]</div>
      <div class="rank-msg">${msg}</div>
      <div class="stat-grid">
        <div class="stat-box"><div class="sv">${S.idx}</div><div class="sl">Questions</div></div>
        <div class="stat-box"><div class="sv">${S.best}</div><div class="sl">Best Streak</div></div>
        <div class="stat-box"><div class="sv">${S.lives}</div><div class="sl">Lives Left</div></div>
      </div>
      <div class="controls" style="justify-content:center;gap:10px">
        <button class="cmd" id="btn-retry">> RETRY</button>
        <button class="cmd cyan" id="btn-change">> CHANGE</button>
      </div>
    </div>`;
  $("progbar").style.width="100%";
  $("btn-retry").addEventListener("click",()=>startGame(S.sub,S.lvl));
  $("btn-change").addEventListener("click",showSubjectSelect);
  $("btn-retry").focus();
}

// ─────────────────────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────────────────────
document.addEventListener("keydown",e=>{
  // Don't hijack keys when typing in a fill-in-blank input
  if(e.target&&(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"))return;
  if(e.key==="Enter"){
    const b=document.querySelector("#ctrl .cmd:not(.hint-btn)")||$("btn-retry");
    if(b){b.click();return;}
  }
  if(e.key==="h"||e.key==="H"){
    const hb=$("hint-btn");if(hb&&!hb.disabled)hb.click();return;
  }
  if(!S.answered){
    const map={a:0,b:1,c:2,d:3,"1":0,"2":1,"3":2,"4":3};
    const idx=map[e.key.toLowerCase()];
    if(idx!==undefined){
      const btns=document.querySelectorAll(".answer-btn:not(:disabled)");
      // find visible (non-eliminated) btn at logical position
      const allBtns=document.querySelectorAll(".answer-btn");
      if(allBtns[idx]&&!allBtns[idx].disabled)allBtns[idx].click();
    }
  }
});

// ─────────────────────────────────────────────────────────────
// SERVICE WORKER
// ─────────────────────────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
showSubjectSelect();
</script>
